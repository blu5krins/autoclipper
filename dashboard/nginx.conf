server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large video uploads (default 1m triggers 413)
    client_max_body_size 2048m;
    # Stream the request body straight to the backend instead of buffering to disk
    proxy_request_buffering off;
    proxy_http_version 1.1;

    # Never cache the SPA entry point so dashboard updates are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }

    # Proxy API + file downloads to the backend service
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
