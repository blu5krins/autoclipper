services:
  backend:
    build: .
    container_name: autoclipper-backend
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
      - yt_config:/app/yt_config
      - ./client_secret.json:/app/client_secret.json:ro
    env_file:
      - .env
    environment:
      - OUTPUT_ROOT=/app/output
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-2}
      - YT_CLIENT_SECRET=/app/client_secret.json
      - YT_CONFIG_DIR=/app/yt_config
      - AUTOCLIPPER_SECRET=${AUTOCLIPPER_SECRET:-change-me-to-a-long-random-string}
      - AUTOCLIPPER_DB=/app/data/autoclipper.db
    volumes:
      - autoclipper_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./dashboard
    container_name: autoclipper-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  yt_config:
  autoclipper_data:
